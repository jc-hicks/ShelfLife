<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShelfLife</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="css/main.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Forum&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
      <div class="container">
        <a class="navbar-brand text-start" href="/index.html">ShelfLife</a>
        <div class="d-flex gap-2 ms-auto">
          <a class="btn btn-outline-light btn-sm" href="/index.html">Pantry</a>
          <a class="btn btn-outline-light btn-sm" href="/recipes.html">Recipes</a>
        </div>
      </div>
    </nav>
    <main>
      <div class="container mt-5">
        <!-- Top Shelf Section -->
        <div class="row">
          <div class="col-12">
            <div class="my-shelf">
              <h3>My Shelf</h3>
              <p class="shelf-priority-note text-muted mb-3">
                Use items at the top first.
              </p>

              <div class="shelf-toolbar mb-3">
                <div class="shelf-search-wrap">
                  <label for="shelf-search-input" class="form-label visually-hidden">
                    Search shelf
                  </label>
                  <input
                    type="search"
                    class="form-control"
                    id="shelf-search-input"
                    placeholder="Search shelf items..."
                    autocomplete="off"
                  />
                </div>
                <button
                  type="button"
                  class="btn btn-outline-secondary btn-sm"
                  id="shelf-clear-filters-btn">
                  Clear search
                </button>
              </div>

              <p
                class="shelf-results-note text-muted small mb-2"
                id="shelf-results-note"
                aria-live="polite"></p>

              <div class="table-responsive">
              <table class="table" id="shelf-table">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>
                      <button type="button" class="shelf-sort-btn" data-sort="priority" aria-label="Sort by priority">
                        Priority <span class="shelf-sort-arrow" aria-hidden="true">&#8597;</span>
                      </button>
                    </th>
                    <th>
                      <button type="button" class="shelf-sort-btn" data-sort="food" aria-label="Sort by food">
                        Food <span class="shelf-sort-arrow" aria-hidden="true">&#8597;</span>
                      </button>
                    </th>
                    <th>
                      <button type="button" class="shelf-sort-btn" data-sort="quantity" aria-label="Sort by quantity">
                        Quantity <span class="shelf-sort-arrow" aria-hidden="true">&#8597;</span>
                      </button>
                    </th>
                    <th>
                      <button type="button" class="shelf-sort-btn" data-sort="cost" aria-label="Sort by cost">
                        Cost <span class="shelf-sort-arrow" aria-hidden="true">&#8597;</span>
                      </button>
                    </th>
                    <th>
                      <button type="button" class="shelf-sort-btn" data-sort="expirationDate" aria-label="Sort by expiration date">
                        Expiration Date <span class="shelf-sort-arrow" aria-hidden="true">&#8597;</span>
                      </button>
                    </th>
                    <th>
                      <button type="button" class="shelf-sort-btn" data-sort="storedDate" aria-label="Sort by stored date">
                        Stored On <span class="shelf-sort-arrow" aria-hidden="true">&#8597;</span>
                      </button>
                    </th>
                    <th>Action</th>
                  </tr>
                </thead>

                <tbody id="shelf-table-body">
                  <tr></tr>
                </tbody>
              </table>
              </div>
            </div>
          </div>
        </div>

        <!-- Bottom Two Panels -->
        <div class="row mt-4">
          <div class="col-md-6">
            <div class="shopping-list">
              <h2>Smart Shopping Suggestions</h2>
              <table class="table">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Ingredient</th>
                    <th>Why</th>
                  </tr>
                </thead>

                <tbody id="shopping-list-table">
                  <tr></tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="col-md-6">
            <div class="add-item">
              <h2>Add to your Shelf:</h2>
              <form id="add-item-form">
                <div class="mb-3">
                  <label for="shelf-item-input" class="form-label">
                    Food or Meal
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="shelf-item-input"
                    name="food"
                  />
                </div>

                <div class="mb-3">
                  <label for="store-date-input" class="form-label">
                    Stored On
                  </label>
                  <input
                    type="date"
                    class="form-control"
                    id="store-date-input"
                    name="storedDate"
                  />
                </div>

                <div class="mb-3">
                  <label for="expiration-date-input" class="form-label">
                    Expiration Date
                  </label>
                  <input
                    type="date"
                    class="form-control"
                    id="expiration-date-input"
                    name="expirationDate"
                  />
                </div>

                <div class="mb-3">
                  <label for="quantity-input" class="form-label">Quantity</label>
                  <div class="input-group">
                    <input
                      type="number"
                      class="form-control"
                      id="quantity-input"
                      name="quantity"
                      min="0"
                      step="any"
                      placeholder="Amount"
                    />
                    <select
                      class="form-select"
                      id="quantity-unit-input"
                      name="quantityUnit"
                    ></select>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="cost-input" class="form-label">Cost</label>
                  <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input
                      type="number"
                      class="form-control"
                      id="cost-input"
                      name="cost"
                      min="0"
                      step="0.01"
                      placeholder="0.00"
                    />
                  </div>
                </div>

                <button type="submit" class="btn btn-primary">Add Item</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="js/dashboard.js"></script>
  </body>
</html>
